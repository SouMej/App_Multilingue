<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  Fragment Thymeleaf réutilisable : navbar.
  Inclus dans chaque page via :
    <div th:replace="~{common/navbar :: navbar}"></div>

  th:replace copie TOUT le fragment (balise comprise).
  th:insert  insère le contenu à l'intérieur de la balise hôte.
-->
<nav th:fragment="navbar" class="navbar">
  <div class="navbar-container">

    <!-- Logo -->
    <a th:href="@{/}" class="navbar-brand">
      <span class="brand-icon">🎓</span>
      <span th:text="#{nav.brand}">Événements Étudiants</span>
    </a>

    <!-- Liens de navigation -->
    <div class="navbar-menu">
      <a th:href="@{/}" class="nav-link"
         th:classappend="${#request != null and (#request.requestURI == '/' or
                           #request.requestURI == '/home')} ? ' active' : ''">
        <span th:text="#{nav.home}">Accueil</span>
      </a>
      <sec:authorize access="isAuthenticated()">
        <a th:href="@{/events}" class="nav-link"
           th:classappend="${#request != null and #request.requestURI.contains('/events')} ? ' active' : ''">
          <span th:text="#{nav.events}">Événements</span>
        </a>
      </sec:authorize>
    </div>

    <!-- Actions droite -->
    <div class="navbar-actions">

      <!-- ===== SÉLECTEUR DE LANGUE ===== -->
      <!--
        th:href="@{''(lang='fr')}" ajoute ?lang=fr à l'URL courante.
        LocaleChangeInterceptor intercepte ce paramètre et change la locale.
        La langue est ensuite sauvegardée dans un Cookie (30 jours).
      -->
      <div class="lang-switcher">
        <a th:href="@{''(lang='fr')}" class="lang-btn"
           th:classappend="${#locale.language == 'fr'} ? ' active'"
           title="Français">
          <span>🇫🇷</span><span class="lang-lbl">FR</span>
        </a>
        <a th:href="@{''(lang='en')}" class="lang-btn"
           th:classappend="${#locale.language == 'en'} ? ' active'"
           title="English">
          <span>🇬🇧</span><span class="lang-lbl">EN</span>
        </a>
        <a th:href="@{''(lang='ar')}" class="lang-btn"
           th:classappend="${#locale.language == 'ar'} ? ' active'"
           title="عربي">
          <span>🇩🇿</span><span class="lang-lbl">عر</span>
        </a>
      </div>

      <!-- NON connecté -->
      <sec:authorize access="isAnonymous()">
        <a th:href="@{/login}"    class="btn btn-outline" th:text="#{nav.login}">Connexion</a>
        <a th:href="@{/register}" class="btn btn-primary" th:text="#{nav.register}">S'inscrire</a>
      </sec:authorize>

      <!-- CONNECTÉ : prénom + bouton déconnexion -->
      <sec:authorize access="isAuthenticated()">
        <div class="user-info" th:if="${currentUser != null}">
          <span class="user-avatar"
                th:text="${#strings.substring(currentUser.firstName,0,1)}">M</span>
          <span class="user-name">
            <span th:text="#{nav.welcome}">Bonjour,</span>
            <strong th:text="${currentUser.firstName}">Marie</strong>
          </span>
        </div>
        <!-- Spring Security exige un POST pour la déconnexion (protection CSRF) -->
        <form th:action="@{/logout}" method="post" style="display:inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-outline btn-sm"
                  th:text="#{nav.logout}">Déconnexion</button>
        </form>
      </sec:authorize>

    </div>
  </div>
</nav>

</body>
</html>
