<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}"
      th:dir="${#locale.language == 'ar'} ? 'rtl' : 'ltr'">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{register.title}">Créer un compte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Noto+Sans+Arabic:wght@400;600&display=swap"
        rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/resources/css/main.css}"/>
</head>
<body class="page-auth">

  <div th:replace="~{common/navbar :: navbar}"></div>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-hd">
        <div class="auth-ico">📝</div>
        <h1 th:text="#{register.title}">Créer un compte</h1>
        <p  th:text="#{register.subtitle}">Rejoignez la communauté</p>
      </div>

      <!-- Erreur métier (email déjà pris, mdp faible…) -->
      <div th:if="${errorKey}" class="alert alert-err">
        ⚠️ <span th:text="#{__${errorKey}__}">Erreur</span>
      </div>

      <!--
        th:object="${dto}"  : lie le formulaire au DTO UserRegistrationDto
        th:field="*{email}" : lie le champ à la propriété email du DTO
        th:errors="*{email}": affiche les erreurs de validation @Valid
      -->
      <form th:action="@{/register}" th:object="${dto}"
            method="post" class="auth-form">

        <!-- Ligne Prénom + Nom -->
        <div class="form-row">
          <div class="fg">
            <label th:for="firstName" th:text="#{register.firstname}">Prénom</label>
            <input type="text" th:field="*{firstName}" id="firstName"
                   th:classappend="${#fields.hasErrors('firstName')} ? 'input-err'"
                   autocomplete="given-name"/>
            <span class="ferr" th:if="${#fields.hasErrors('firstName')}"
                  th:errors="*{firstName}"></span>
          </div>
          <div class="fg">
            <label th:for="lastName" th:text="#{register.lastname}">Nom</label>
            <input type="text" th:field="*{lastName}" id="lastName"
                   th:classappend="${#fields.hasErrors('lastName')} ? 'input-err'"
                   autocomplete="family-name"/>
            <span class="ferr" th:if="${#fields.hasErrors('lastName')}"
                  th:errors="*{lastName}"></span>
          </div>
        </div>

        <!-- Email -->
        <div class="fg">
          <label th:for="email" th:text="#{register.email}">E-mail</label>
          <input type="email" th:field="*{email}" id="email"
                 th:classappend="${#fields.hasErrors('email')} ? 'input-err'"
                 autocomplete="email"/>
          <span class="ferr" th:if="${#fields.hasErrors('email')}"
                th:errors="*{email}"></span>
        </div>

        <!-- Mot de passe -->
        <div class="fg">
          <label th:for="password" th:text="#{register.password}">Mot de passe</label>
          <div class="iw">
            <input type="password" th:field="*{password}" id="password"
                   th:classappend="${#fields.hasErrors('password')} ? 'input-err'"
                   autocomplete="new-password"/>
            <button type="button" class="eye-btn"
                    onclick="togglePwd('password')">👁️</button>
          </div>
          <span class="ferr" th:if="${#fields.hasErrors('password')}"
                th:errors="*{password}"></span>
          <span class="hint" th:text="#{register.password.hint}">Hint</span>
          <!-- Barre de force du mot de passe (remplie par JS) -->
          <div class="str-bar"><div id="str-fill" class="str-fill"></div></div>
          <span id="str-lbl" class="str-lbl"></span>
        </div>

        <!-- Confirmation -->
        <div class="fg">
          <label th:for="confirmPassword" th:text="#{register.confirm}">Confirmer</label>
          <div class="iw">
            <input type="password" th:field="*{confirmPassword}" id="confirmPassword"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'input-err'"
                   autocomplete="new-password"/>
            <button type="button" class="eye-btn"
                    onclick="togglePwd('confirmPassword')">👁️</button>
          </div>
          <span class="ferr" th:if="${#fields.hasErrors('confirmPassword')}"
                th:errors="*{confirmPassword}"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full"
                th:text="#{register.submit}">Créer</button>

        <div class="auth-sw">
          <span th:text="#{register.already}">Déjà inscrit ?</span>
          <a th:href="@{/login}" th:text="#{register.login.link}">Se connecter</a>
        </div>

      </form>
    </div>
  </main>

  <script th:src="@{/resources/js/main.js}"></script>
</body>
</html>
