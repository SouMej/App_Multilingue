<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}"
      th:dir="${#locale.language == 'ar'} ? 'rtl' : 'ltr'">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="#{login.title}">Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Noto+Sans+Arabic:wght@400;600&display=swap"
        rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/resources/css/main.css}"/>
</head>
<body class="page-auth">

  <div th:replace="~{common/navbar :: navbar}"></div>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-hd">
        <div class="auth-ico">🔐</div>
        <h1 th:text="#{login.title}">Connexion</h1>
        <p  th:text="#{login.subtitle}">Heureux de vous revoir !</p>
      </div>

      <!-- Message de succès après inscription (flash attribute) -->
      <div th:if="${successKey}" class="alert alert-ok">
        ✅ <span th:text="#{__${successKey}__}">Succès</span>
      </div>

      <!-- Erreur de connexion (mauvais mot de passe) -->
      <div th:if="${errorKey}" class="alert alert-err">
        ⚠️ <span th:text="#{__${errorKey}__}">Erreur</span>
      </div>

      <!-- Message de déconnexion -->
      <div th:if="${logoutDone}" class="alert alert-info">
        ℹ️ Vous avez été déconnecté.
      </div>

      <!--
        Le POST /login est traité par Spring Security automatiquement.
        Pas besoin de @PostMapping dans le contrôleur.

        Spring Security lit :
          - le champ "email"    (usernameParameter configuré dans SecurityConfig)
          - le champ "password"
          - le token CSRF       (th:action le génère automatiquement)
      -->
      <form th:action="@{/login}" method="post" class="auth-form">

        <div class="fg">
          <label th:for="email" th:text="#{login.email}">E-mail</label>
          <input type="email" id="email" name="email"
                 th:placeholder="#{login.email}"
                 autocomplete="email" autofocus required/>
        </div>

        <div class="fg">
          <label th:for="password" th:text="#{login.password}">Mot de passe</label>
          <div class="iw">
            <input type="password" id="password" name="password"
                   th:placeholder="#{login.password}"
                   autocomplete="current-password" required/>
            <button type="button" class="eye-btn"
                    onclick="togglePwd('password')">👁️</button>
          </div>
        </div>

        <div class="fg fg-chk">
          <label class="chk-lbl">
            <input type="checkbox" name="rememberMe"/>
            <span th:text="#{login.remember}">Se souvenir de moi</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full"
                th:text="#{login.submit}">Se connecter</button>

        <div class="auth-sw">
          <span th:text="#{login.no.account}">Pas de compte ?</span>
          <a th:href="@{/register}" th:text="#{login.register.link}">S'inscrire</a>
        </div>
      </form>

      <!-- Indice démo pour le TP -->
      <div class="demo-hint">
        💡 <strong>Compte démo :</strong> etudiant@universite.fr / Etudiant1
      </div>

    </div>
  </main>

  <script th:src="@{/resources/js/main.js}"></script>
</body>
</html>
